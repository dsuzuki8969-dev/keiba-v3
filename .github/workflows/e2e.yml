name: E2E Tests

# 改善5: on セクション拡張 (workflow_dispatch + paths-ignore)
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'plans/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'plans/**'
  workflow_dispatch:  # 手動トリガー追加

# 改善4: 重複実行防止 concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 改善2: job レベルタイムアウト (default 6 時間 → 15 分)

    steps:
      # ソースコードをチェックアウト
      - uses: actions/checkout@v4

      # Node.js セットアップ (package-lock.json ベースでキャッシュ)
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # npm 依存パッケージインストール
      - name: npm 依存インストール
        working-directory: frontend
        run: npm ci

      # 改善1: Playwright ブラウザキャッシュ (実行時間短縮)
      - name: Playwright ブラウザキャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      # Playwright ブラウザ (chromium のみ) インストール
      - name: Playwright ブラウザインストール
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # フロントエンドビルド
      - name: フロントエンドビルド
        working-directory: frontend
        run: npm run build

      # Python セットアップ
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 改善6: Python 依存キャッシュ追加
      - name: Python 依存キャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Python 依存パッケージインストール
      - name: Python 依存インストール
        run: pip install -r requirements.txt

      # Flask バックエンド起動 (MLモデルなしのダミーモードで起動)
      # ビルド成果物を src/static/ にコピーしてから起動
      - name: Flask バックエンド起動
        run: |
          cp -r frontend/dist/. src/static/
          KEIBA_HOST=127.0.0.1 KEIBA_PORT=5051 PYTHONIOENCODING=utf-8 python src/dashboard.py > /tmp/dashboard.log 2>&1 &
          echo "Flask バックエンド起動中... 60秒待機"
          sleep 60
        env:
          PYTHONUNBUFFERED: "1"
          # CI 環境では DB・モデルが存在しないため軽量起動モード
          CI: "true"

      # Flask の起動確認
      - name: Flask ヘルスチェック
        run: |
          curl -f http://127.0.0.1:5051/ || (echo "Flask 起動失敗" && exit 1)

      # E2E テスト実行
      # 改善2: step レベルタイムアウト 10 分
      - name: E2E テスト実行
        working-directory: frontend
        timeout-minutes: 10
        run: npx playwright test e2e/responsive-check.spec.ts --project=chromium --reporter=list
        env:
          E2E_BASE_URL: "http://127.0.0.1:5051"

      # 改善3: テスト失敗時にスクリーンショット + Playwright レポートをアーティファクトとして保存
      - name: スクリーンショット保存 (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/e2e-screenshots/
          retention-days: 14  # 7 → 14 日に拡張

      # 改善3: Playwright HTML レポートをアーティファクトとして保存 (失敗時)
      - name: Playwright レポート保存 (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      # 改善7: dashboard.log をアーティファクトとして保存 (Flask 起動失敗デバッグ用)
      - name: ダッシュボードログ保存 (失敗時)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-log
          path: /tmp/dashboard.log
          retention-days: 14
